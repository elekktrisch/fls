# FLS e2e test stack
# ----------------------------------------------------------------------------
# Brings up the *out-of-process* dependencies the Playwright suite needs:
#
#   - mssql:   SQL Server 2022 Developer, seeded by hand (see TESTING.md
#              Milestone 1). Holds the FLSTest database.
#   - mailpit: SMTP sink + REST API + Web UI. The FLS server is pointed at
#              its SMTP listener (1025) so the email-related specs can
#              assert deliveries via Mailpit's /api/v1/messages endpoint
#              (see task #24 — Mailpit helper not yet written).
#
# What is intentionally NOT in here:
#
#   - The FLS Web API (Mono + .NET 4.5 + OWIN self-host, console exe)
#   - The flsweb webpack-dev-server (Node 8 + webpack 1 + babel ES2015)
#
# Both are awkward to containerize cleanly: the server needs Mono 6.12
# plus a hand-built FLS.Server.Console.exe and a copy of
# EntityFramework.SqlServer.dll dropped next to it; the client needs
# Node 8 via nvm and a couple of case-sensitivity sed fixes against
# the legacy webpack-1 bundle. Until someone invests in proper images
# for them, dev-up.sh starts the database + email sink via this file
# and TESTING.md (Milestones 2-3 and 5) covers building / running the
# two app processes locally.
#
# Run under a dedicated compose project name so this can live next to a
# manually-started stack:
#
#   docker compose -p fls-e2e up -d
#   docker compose -p fls-e2e down -v
#
# Both helper scripts (e2e/scripts/dev-up.sh, e2e/scripts/dev-down.sh)
# already pass the -p flag.
# ----------------------------------------------------------------------------

# All ports bound to 127.0.0.1 so the dev stack is reachable only from the
# host machine, not from the LAN. Credentials here are weak-by-design ("dev"
# / "alpenflight/alpenflight" / "Demo#FLS#2026") for operator convenience — restricting the
# bind ensures a laptop on an untrusted network doesn't expose the DBs to
# a one-word-guess attack.

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Demo#FLS#2026"
      MSSQL_PID: Developer
    ports:
      - "127.0.0.1:1433:1433"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Demo#FLS#2026' -C -Q 'SELECT 1' || exit 1"
      interval: 5s
      timeout: 5s
      retries: 30

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "127.0.0.1:1025:1025"   # SMTP listener (FLS server + AlpenFlight backend -> here)
      - "127.0.0.1:8025:8025"   # HTTP API + Web UI (tests + dev inbox inspection -> here)
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "-q"
        - "--spider"
        - "http://localhost:8025/api/v1/info"
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # next/ — target stack (Postgres + pgAdmin + Keycloak). Activated by passing
  # the 'next' compose profile so the default `docker compose up` (used by
  # e2e/scripts/dev-up.sh) still starts only mssql + mailpit.
  #
  #   docker compose -p fls-e2e --profile next up -d
  #
  # next/ops/dev-up-full.sh wraps the legacy + target dance + Flyway migrate
  # in one command. pgAdmin loads next/ops/pgadmin/servers.json so the target
  # connection appears pre-wired on first login. Operator manual + footguns
  # live in next/ops/README.md. Mailpit (legacy default profile) is reused as
  # the AlpenFlight backend's SMTP sink — point Spring at host:1025.
  # ---------------------------------------------------------------------------

  postgres:
    profiles: ["next"]
    image: postgres:17.4-alpine
    environment:
      POSTGRES_DB: alpenflight
      POSTGRES_USER: alpenflight
      POSTGRES_PASSWORD: alpenflight
    ports:
      - "127.0.0.1:5432:5432"
    # No volume — data is ephemeral. `docker compose down` wipes it; the
    # dev-up-full.sh script re-applies Flyway migrations after restart, so
    # the baseline state is reproducible without persistence. Add a named
    # volume here if you want survival across `down`.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpenflight -d alpenflight"]
      interval: 3s
      timeout: 3s
      retries: 20

  # --- DEV ONLY -------------------------------------------------------------
  # The pgadmin service ships placeholder credentials (dev@example.com / dev)
  # for unattended first-login on a developer laptop. Never copy this block
  # into a staging / production compose — the credentials are weak by design.
  # Production pgAdmin (if ever) must run behind an IdP-fronted reverse proxy
  # with no embedded defaults.
  # --------------------------------------------------------------------------
  pgadmin:
    profiles: ["next"]
    # Custom image baked with next/ops/pgadmin/servers.json so the FLS Target
    # connection appears pre-wired on first login. Bind-mounting servers.json
    # is unreliable on Docker Desktop without file-sharing for the repo path;
    # baking it in is the portable route.
    build:
      context: ./next/ops/pgadmin
      dockerfile: Dockerfile
    image: alpenflight-pgadmin:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # `.local` is rejected by pgadmin's email validator (reserved TLD).
      # Use example.com for the placeholder dev login.
      PGADMIN_DEFAULT_EMAIL: dev@example.com
      PGADMIN_DEFAULT_PASSWORD: dev
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "127.0.0.1:5050:80"
    healthcheck:
      # pgAdmin's /misc/ping endpoint replies "PING" once the WSGI app is up.
      # gunicorn boot takes ~7s; pad start_period to 30s so the first probe
      # never lands before the listener is open.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/misc/ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Keycloak — OIDC IdP for the AlpenFlight stack. Runs in dev mode (H2,
  # bootstrap admin) with no realm imported yet — S-019 lands `next/auth/
  # realm-export.json` and amends this block to add `--import-realm` plus the
  # bind-mount. Until then, the AlpenFlight realm is created by hand via the
  # admin console (http://localhost:8090, admin / admin).
  #
  # Host port 8090 (NOT 8080) — the AlpenFlight server runs on 8080 by default,
  # so Keycloak's HTTP listener is exposed on 8090 to avoid collision. The
  # container still listens on 8080 internally, so backend code reaching
  # Keycloak via the compose network DNS (`http://keycloak:8080`) is
  # unaffected.
  #
  # KC_HOSTNAME_URL pins the issuer Keycloak emits in tokens to
  # http://localhost:8090 so the iss claim matches what the SPA + backend
  # both observe from the host.
  # ---------------------------------------------------------------------------
  keycloak:
    profiles: ["next"]
    image: quay.io/keycloak/keycloak:26.5
    command: ["start-dev", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_URL: http://localhost:8090
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:8090:8080"
      - "127.0.0.1:9090:9000"   # management interface (/health/ready)
    healthcheck:
      # Keycloak 25+ exposes /health/ready on the management port (9000) when
      # KC_HEALTH_ENABLED=true. The image ships no curl/wget, so probe via the
      # bundled Java HttpClient one-liner instead.
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3"
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s
