name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Decide whether the next/ lane needs to run based on what changed.
  #
  # Legacy (flsserver + flsweb + e2e) is reference-only and exercised by the
  # `nightly.yml` workflow on a schedule — see CLAUDE.md "Legacy is
  # reference-only". PR CI only gates the rewrite.
  #
  # Markdown-only diffs match neither lane: the only job that runs is the
  # `required` aggregator (always green), which keeps branch protection
  # satisfied without spending compute.
  # ---------------------------------------------------------------------------
  changes:
    name: detect changes
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    outputs:
      next: ${{ steps.filter.outputs.next }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            next:
              - '{.github/workflows/ci.yml,next/**}'
              - '!**/*.md'


  # ---------------------------------------------------------------------------
  # next/ build — Spring Boot (Gradle) under next/server, Angular under
  # next/web. Detects which subdir is buildable; runs only what exists.
  # Legacy lanes live in `nightly.yml` (cron + workflow_dispatch); PR CI
  # only gates the rewrite.
  # ---------------------------------------------------------------------------
  next-build:
    name: next build
    needs: changes
    if: needs.changes.outputs.next == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Detect buildable next subdirs
        id: detect
        run: |
          if [ -f next/server/build.gradle.kts ] || [ -f next/server/build.gradle ]; then
            echo "server=true" >> $GITHUB_OUTPUT
          else
            echo "server=false" >> $GITHUB_OUTPUT
          fi
          if [ -f next/web/package.json ]; then
            echo "web=true" >> $GITHUB_OUTPUT
          else
            echo "web=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 25
        if: steps.detect.outputs.server == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Set up Gradle
        if: steps.detect.outputs.server == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build next/server
        if: steps.detect.outputs.server == 'true'
        working-directory: next/server
        run: ./gradlew build --no-daemon

      - name: Set up Node 22
        if: steps.detect.outputs.web == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: next/web/.nvmrc

      - name: Set up pnpm
        if: steps.detect.outputs.web == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Restore pnpm store cache
        if: steps.detect.outputs.web == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('next/web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install next/web deps
        if: steps.detect.outputs.web == 'true'
        working-directory: next/web
        env:
          CI: 'true'
        run: pnpm install --frozen-lockfile

      - name: Regenerate API client and assert no drift
        if: steps.detect.outputs.web == 'true'
        working-directory: next/web
        run: |
          pnpm run generate-api
          if ! git diff --exit-code src/app/api/generated/; then
            echo "::error::Generated API client is stale. Run 'pnpm run generate-api' locally and commit the result."
            exit 1
          fi

      # `pnpm test` is intentionally not run yet — the new posture (per
      # next/web/CLAUDE.md §8) is vitest = logic-only specs, Playwright =
      # DOM. The repo currently has zero logic specs, and `ng test` exits
      # 1 on "no tests found." Re-enable this step in the first PR that
      # lands a logic spec (a service / signal store / pure utility).
      - name: Lint + format + build next/web
        if: steps.detect.outputs.web == 'true'
        working-directory: next/web
        run: |
          pnpm lint
          pnpm format
          pnpm build:prod

  # ---------------------------------------------------------------------------
  # Aggregator — single check to wire into branch protection. Passes when
  # every upstream job either succeeded or was correctly skipped (e.g.
  # docs-only PRs skip the next lane, that job reports `skipped`, aggregator
  # is green).
  # ---------------------------------------------------------------------------
  required:
    name: required
    needs: [changes, next-build]
    if: always()
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    steps:
      - name: Check upstream job results
        env:
          R_CHANGES: ${{ needs.changes.result }}
          R_NEXT: ${{ needs.next-build.result }}
        run: |
          fail=0
          for pair in \
              "changes:$R_CHANGES" \
              "next-build:$R_NEXT" ; do
            name="${pair%%:*}"
            result="${pair##*:}"
            case "$result" in
              success|skipped) printf "  %-22s %s\n" "$name" "$result" ;;
              *)               printf "  %-22s %s  <-- failing\n" "$name" "$result"; fail=1 ;;
            esac
          done
          [ "$fail" = "0" ]
