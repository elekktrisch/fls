<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>FLS e2e dashboard</title>
<style>
:root {
  --bg: #f7f8fa;
  --surface: #ffffff;
  --surface-2: #eef1f4;
  --text: #1a1d21;
  --muted: #5c6470;
  --border: #e3e6ea;
  --primary: #0a66c2;
  --primary-hover: #0552a3;
  --success: #0a7f3f;
  --success-bg: #e3f5ea;
  --failure: #c0353a;
  --failure-bg: #fbe6e7;
  --skipped: #8a6c1d;
  --skipped-bg: #fcf2d9;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.06);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1c222b;
    --text: #e6edf3;
    --muted: #8d96a0;
    --border: #2a313b;
    --primary: #4da3ff;
    --primary-hover: #79bbff;
    --success: #3fb950;
    --success-bg: #14271b;
    --failure: #f85149;
    --failure-bg: #2a1416;
    --skipped: #d29922;
    --skipped-bg: #2a1f0a;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 1px 3px rgba(0,0,0,.3);
  }
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 1200px; margin: 0 auto; padding: clamp(1rem, 3vw, 2.5rem) clamp(1rem, 3vw, 1.5rem); }
header { margin-bottom: 2rem; }
h1 { font-size: clamp(1.5rem, 4vw, 2.25rem); margin: 0 0 .5rem; letter-spacing: -.02em; }
h2 { font-size: 1.25rem; margin: 2.5rem 0 1rem; letter-spacing: -.01em; }
h3 { font-size: 1rem; margin: 0 0 .25rem; }
p { margin: 0; color: var(--muted); }
code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .85em; background: var(--surface-2); padding: .1em .4em; border-radius: 4px; }
.meta { font-size: .9rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: .5rem 1.25rem; align-items: center; }
.pills { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem; }
.pill { font-size: .75rem; font-weight: 600; padding: .3rem .7rem; border-radius: 999px; text-transform: uppercase; letter-spacing: .04em; }
.pill--success { color: var(--success); background: var(--success-bg); }
.pill--failure, .pill--cancelled { color: var(--failure); background: var(--failure-bg); }
.pill--skipped { color: var(--skipped); background: var(--skipped-bg); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
.card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  text-decoration: none;
  color: inherit;
  box-shadow: var(--shadow);
  transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
}
.card:hover, .card:focus-visible { border-color: var(--primary); transform: translateY(-1px); outline: none; }
.card p { font-size: .875rem; margin-top: .25rem; }
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: .75rem; margin-bottom: 1.5rem; }
.cat { font-size: .95rem; margin: 1.25rem 0 .5rem; letter-spacing: -.005em; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; color: var(--muted); text-transform: uppercase; font-weight: 600; }
.shot {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  transition: border-color .12s ease, transform .12s ease;
}
.shot:hover, .shot:focus-visible { border-color: var(--primary); transform: translateY(-1px); outline: none; }
.shot img { width: 100%; height: auto; display: block; aspect-ratio: 16 / 10; object-fit: cover; background: var(--surface-2); }
.shot span { display: block; padding: .5rem .75rem; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .75rem; word-break: break-all; color: var(--muted); }
footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); font-size: .85rem; color: var(--muted); }
footer a { color: var(--primary); text-decoration: none; }
footer a:hover { color: var(--primary-hover); text-decoration: underline; }
@media (max-width: 480px) {
  .meta { font-size: .8rem; }
  .card { padding: .875rem 1rem; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>FLS end-to-end run</h1>
    <div class="meta">
      <span>${TIMESTAMP}</span>
      <span>Commit <code>${COMMIT_SHORT}</code></span>
    </div>
    <div class="pills">
      <span class="pill pill--${PW_OUTCOME}">playwright &middot; ${PW_OUTCOME}</span>
    </div>
  </header>

  <section>
    <h2>Reports &amp; logs</h2>
    <div class="grid">
      ${REPORTS}
    </div>
  </section>

  ${SCREENSHOTS}

  <footer>
    Generated by the <a href="https://github.com/elekktrisch/fls/actions/workflows/e2e.yml">e2e workflow</a>.
    Source: <a href="https://github.com/elekktrisch/fls">elekktrisch/fls</a>.
  </footer>
</div>
</body>
</html>
