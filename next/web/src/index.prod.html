    <!--
      No inline CSP. Production CSP is owned by the S-041 reverse proxy
      via a response header (per S-021 security plan + ADR 0007). The
      response header is canonical; a meta-tag CSP here would either
      leak dev URLs into the prod bundle or duplicate-and-drift against
      the proxy policy.
    -->
  </head>

  </body>
