server:
  port: 0

spring:
  # No datasource pinned at the profile level. Every @SpringBootTest wires
  # to SharedPostgresContainer via @DynamicPropertySource — one JVM-wide
  # Postgres testcontainer is shared across all DB-touching classes. The
  # prior H2-with-MODE=PostgreSQL fallback was retired because V2+
  # migrations use uuid, TEXT[], partial indexes, and COMMENT ON COLUMN
  # which H2 can't parse even in PG-compat mode.
  datasource:
    hikari:
      # Cap pool size per Spring context. The context cache keeps several
      # contexts alive across mock-auth / no-mock-auth / springdoc-test
      # variants — without a cap each acquires Hikari's default 10
      # connections and the shared testcontainer exhausts PG's max_connections.
      maximum-pool-size: 4
  flyway:
    # Eliminates container-readiness flake in integration tests without
    # touching prod startup. Per S-009 performance plan.
    connect-retries: 5
    connect-retries-interval: 2s
  security:
    oauth2:
      resourceserver:
        jwt:
          # Synthetic issuer matching JwtTestFixture's iss claim. The fixture
          # registers a @Primary JwtDecoder that overrides the production bean
          # and validates against an in-process RSA keypair, so the URL itself
          # never hits the network. A real value still has to be present —
          # without it the production JwtDecoder @Bean fails to construct
          # during context startup.
          issuer-uri: http://test-issuer
          jwk-set-uri: http://test-issuer/jwks
