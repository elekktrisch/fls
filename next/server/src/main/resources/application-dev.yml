spring:
  datasource:
    # Loopback defaults so `./gradlew bootRun` works against a compose-up
    # Postgres without setting env vars. CI + prod must set the real env.
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/fls}
    username: ${DATASOURCE_USER:fls}
    password: ${DATASOURCE_PASSWORD:fls}

server:
  error:
    include-message: always
    include-binding-errors: always
management:
  endpoint:
    health:
      # Full health details (db, disk, mail) are useful locally but constitute
      # info disclosure on any reachable network. Contract: the dev profile
      # MUST NOT be deployed beyond loopback. Prod uses `when_authorized`.
      show-details: always
logging:
  level:
    root: INFO
    ch.fls: DEBUG
