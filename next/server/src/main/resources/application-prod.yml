spring:
  main:
    banner-mode: off
  # S-048 fail-fast guard. The `mock-auth` profile (walking-skeleton dev
  # only) must NEVER run in production. `MockSecurityConfig.forbidInProd()`
  # @PostConstruct throws if both profiles are co-active — the bean only
  # exists when `mock-auth` is on, so the check fires before any HTTP
  # listener opens. application-mock-auth.yml is the other half of the gate.
  application:
    name: alpenflight-server

# Defense-in-depth re-pin: base application.yml already disables both
# springdoc endpoints, but ops-readers should see the off-state in the prod
# config without inheriting through. To enable on a prod-like environment
# (debugging only, never customer-facing), set SPRINGDOC_API_DOCS_ENABLED=true
# AND fence /v3/api-docs + /swagger-ui/** behind an IP allowlist + bearer auth.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
