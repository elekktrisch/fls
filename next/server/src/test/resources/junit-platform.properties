# JUnit Platform config — read by JunitPlatformConfigTest and the runtime.
#
# parallel.enabled=false is load-bearing: TenantTestContext uses a
# ThreadLocal carrier; if parallel test execution flips on, sibling test
# methods would alias each other's tenant context and silently
# cross-contaminate. Re-enable only after ADR 0021's per-test
# data-isolation policy is audited across the whole suite.
junit.jupiter.execution.parallel.enabled=false
