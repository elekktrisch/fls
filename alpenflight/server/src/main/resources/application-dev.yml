spring:
  datasource:
    # Loopback defaults so `./gradlew bootRun` works against a compose-up
    # Postgres without setting env vars. CI + prod must set the real env.
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/alpenflight}
    username: ${DATASOURCE_USER:alpenflight}
    password: ${DATASOURCE_PASSWORD:alpenflight}
  security:
    oauth2:
      resourceserver:
        jwt:
          # `./gradlew bootRun` runs on the host, not inside compose — the
          # network-side `http://keycloak:8080` resolves only between
          # containers. Override JWKS to the host-published port; the issuer
          # URL stays at the same `localhost:8090` value tokens carry.
          jwk-set-uri: ${ALPENFLIGHT_OIDC_JWK_SET_URI:http://localhost:8090/realms/alpenflight/protocol/openid-connect/certs}

server:
  error:
    include-message: always
    include-binding-errors: always
management:
  endpoint:
    health:
      # Full health details (db, disk, mail) are useful locally but constitute
      # info disclosure on any reachable network. Contract: the dev profile
      # MUST NOT be deployed beyond loopback. Prod uses `when_authorized`.
      show-details: always
logging:
  level:
    root: INFO
    ch.alpenflight: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
